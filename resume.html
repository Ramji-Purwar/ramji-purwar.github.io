<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Resume — Ramji Purwar</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      margin: 0;
    }
    
    .resume-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 1.5rem 2rem;
      background: rgba(250, 249, 246, 0.9);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      z-index: 1000;
    }

    .resume-brand {
      font-family: var(--font-heading);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text);
      display: flex;
      align-items: center;
    }
    
    .resume-brand:hover {
      color: var(--accent);
    }

    .resume-actions {
      display: flex;
      gap: 1rem;
    }

    .resume-container {
      flex: 1;
      width: 100%;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem;
      box-sizing: border-box;
      display: flex;
      justify-content: center;
    }

    .resume-wrapper {
      width: 100%;
      height: 100%;
      background: var(--bg-card);
      border-radius: var(--radius);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      overflow: hidden;
      animation: fadeUp 0.6s var(--ease) forwards;
    }

    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }

    @keyframes fadeUp {
      from {
        opacity: 0;
        transform: translateY(20px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @media (max-width: 768px) {
      .resume-header {
        padding: 1rem;
      }
      .resume-container {
        padding: 0;
      }
      .resume-wrapper {
        border-radius: 0;
        border: none;
      }
    }
  </style>
</head>
<body>

  <div class="resume-header">
    <a href="index.html" class="resume-brand">
      <i class="fa-solid fa-arrow-left" style="margin-right: 0.75rem; font-size: 1rem;"></i> Ramji Purwar
    </a>
    <div class="resume-actions">
      <a href="assets/Resume.pdf" download class="btn-nav btn-filled">
        <i class="fa-solid fa-download" style="margin-right: 0.4rem;"></i> Download
      </a>
    </div>
  </div>

  <div class="resume-container">
    <div class="resume-wrapper">
      <iframe src="assets/Resume.pdf" title="Ramji Purwar Resume"></iframe>
    </div>
  </div>

</body>
</html>
